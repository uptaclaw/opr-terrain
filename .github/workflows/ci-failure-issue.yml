name: Create issue on CI failure

on:
  workflow_run:
    workflows: ["Validate & Deploy to GitHub Pages"]
    types: [completed]

permissions:
  issues: write

jobs:
  create-issue:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.payload.workflow_run.html_url}`;
            const title = `CI failure on main: ${context.payload.workflow_run.name}`;

            // Check for existing open issue with same title to avoid duplicates
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'squad,ci-failure',
              per_page: 10
            });

            const duplicate = existing.data.find(i => i.title === title);
            if (duplicate) {
              // Add a comment to existing issue instead
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: duplicate.number,
                body: `Another failure detected.\n\n**Run:** ${runUrl}\n**Commit:** ${context.payload.workflow_run.head_sha}\n**Time:** ${new Date().toISOString()}`
              });
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `## CI Pipeline Failed\n\n**Workflow:** ${context.payload.workflow_run.name}\n**Branch:** ${context.payload.workflow_run.head_branch}\n**Commit:** ${context.payload.workflow_run.head_sha}\n**Run:** ${runUrl}\n\nThe validate & deploy pipeline failed. Check the run logs for details.\n\n---\n_Auto-created by ci-failure-issue workflow_`,
              labels: ['squad', 'ci-failure']
            });
