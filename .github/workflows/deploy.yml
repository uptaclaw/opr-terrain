name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Ensure remote deploy directory exists
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -eu
            if mkdir -p /var/www/opr-terrain 2>/dev/null; then
              :
            else
              sudo -n mkdir -p /var/www/opr-terrain
              sudo -n chown "$USER":"$USER" /var/www/opr-terrain
            fi

      - name: Deploy static site via rsync
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: -avzr --delete
          path: dist/
          remote_path: /var/www/opr-terrain/
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Install nginx config and reload
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -eu
            cat >/tmp/opr-terrain-default.conf <<'EOF'
            server {
                listen 80 default_server;
                listen [::]:80 default_server;

                server_name _;
                client_max_body_size 100M;

                root /var/www/opr-terrain;
                index index.html;

                location / {
                    try_files $uri $uri/ /index.html;
                }

                location = /health {
                    access_log off;
                    default_type text/plain;
                    return 200 "ok\\n";
                }
            }
            EOF

            if install -m 644 /tmp/opr-terrain-default.conf /etc/nginx/sites-available/default 2>/dev/null; then
              :
            else
              sudo -n install -m 644 /tmp/opr-terrain-default.conf /etc/nginx/sites-available/default
            fi

            if ln -sf /etc/nginx/sites-available/default /etc/nginx/sites-enabled/default 2>/dev/null; then
              :
            else
              sudo -n ln -sf /etc/nginx/sites-available/default /etc/nginx/sites-enabled/default
            fi

            if nginx -t >/dev/null 2>&1 && systemctl reload nginx >/dev/null 2>&1; then
              :
            else
              sudo -n nginx -t
              sudo -n systemctl reload nginx
            fi

      - name: Health check
        run: |
          for i in {1..5}; do
            if curl -fsSL "http://${{ secrets.DEPLOY_HOST }}/" | grep -q '<title>OPR Terrain</title>' && \
               curl -fsSL "http://${{ secrets.DEPLOY_HOST }}/health" | grep -q '^ok$'; then
              echo "Health check passed"
              exit 0
            fi
            echo "Health check failed, retrying..."
            sleep 5
          done
          echo "Health check failed after 5 attempts"
          exit 1
