name: Validate & Deploy to GitHub Pages

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      VITE_BASE_PATH: /opr-terrain/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium + Linux deps
        run: npm run test:e2e:setup:linux

      - name: Run unit tests (Vitest)
        run: npm run test

      - name: Build production bundle
        run: npm run build

      - name: Start preview server
        run: |
          nohup npm run preview -- --host 127.0.0.1 --port 4173 > preview.log 2>&1 &
          echo $! > preview.pid

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:4173/opr-terrain/ > /dev/null; then
              echo "Preview server is ready"
              exit 0
            fi
            sleep 1
          done

          echo "Preview server failed to start"
          cat preview.log || true
          exit 1

      - name: Run Playwright end-to-end tests
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:4173/opr-terrain/
          PLAYWRIGHT_WEB_SERVER: 'off'
        run: npm run test:e2e

      - name: Stop preview server
        if: always()
        run: |
          if [ -f preview.pid ]; then
            kill $(cat preview.pid) || true
          fi

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
            preview.log
          if-no-files-found: ignore

  deploy:
    needs: validate
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        env:
          VITE_BASE_PATH: /opr-terrain/
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
