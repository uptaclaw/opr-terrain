name: Validate & Deploy to Production

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium + Linux deps
        run: npm run test:e2e:setup:linux

      - name: Build production bundle
        run: npm run build

      - name: Start preview server
        run: |
          nohup npm run preview -- --host 127.0.0.1 --port 4173 > /tmp/opr-terrain-preview.log 2>&1 &
          echo $! > /tmp/opr-terrain-preview.pid

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:4173/ > /dev/null; then
              echo "Preview server is ready"
              exit 0
            fi
            sleep 1
          done

          echo "Preview server failed to start"
          cat /tmp/opr-terrain-preview.log || true
          exit 1

      - name: Run Playwright end-to-end tests
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:4173
          PLAYWRIGHT_WEB_SERVER: 'off'
        run: npm run test:e2e

      - name: Stop preview server
        if: always()
        run: |
          if [ -f /tmp/opr-terrain-preview.pid ]; then
            kill $(cat /tmp/opr-terrain-preview.pid) || true
          fi

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
            /tmp/opr-terrain-preview.log
          if-no-files-found: ignore

  deploy:
    needs: validate
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Ensure remote deploy directory exists
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            # Directory should already exist and be owned by deploy user
            # If not, manual setup is required: sudo mkdir -p /var/www/opr-terrain && sudo chown $USER:$USER /var/www/opr-terrain
            mkdir -p /var/www/opr-terrain

      - name: Deploy static site via rsync
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: -avzr --delete
          path: dist/
          remote_path: /var/www/opr-terrain/
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Verify nginx configuration
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            # Nginx should already be configured to serve from /var/www/opr-terrain
            # Verify the configuration is correct
            if ! curl -fsSL http://localhost/ | grep -q '<title>OPR Terrain</title>'; then
              echo "Warning: nginx may not be configured correctly for opr-terrain"
              echo "Manual setup may be required"
              exit 1
            fi
            echo "Nginx configuration verified"

      - name: Health check
        run: |
          for i in {1..5}; do
            if curl -fsSL "http://${{ secrets.DEPLOY_HOST }}/" | grep -q '<title>OPR Terrain</title>' && \
               curl -fsSL "http://${{ secrets.DEPLOY_HOST }}/health" | grep -q '^ok$'; then
              echo "Health check passed"
              exit 0
            fi
            echo "Health check failed, retrying..."
            sleep 5
          done
          echo "Health check failed after 5 attempts"
          exit 1
